version: "3.8"

services:
  bebek-uyku-api:
    build: .
    container_name: bebek-uyku-api
    ports:
      - "8000:5000"
    environment:
      - PORT=5000
      - MODEL_YOLU=/app/models/bebek_uyku_modeli.h5
      - SINIF_YOLU=/app/models/classes.npy
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped
