<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebek Ağlama Analizi</title>
    <style>
        body {
            font-family: -apple-system, Arial, sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f6fa;
            color: #2d3436;
        }
        h1 { font-size: 1.6rem; }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }
        input[type="file"] { margin: 16px 0; }
        button {
            background: #6c5ce7;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:disabled { opacity: .6; cursor: not-allowed; }
        #result { margin-top: 20px; white-space: pre-wrap; }
        .prob-bar {
            background: #dfe6e9;
            border-radius: 6px;
            overflow: hidden;
            height: 18px;
            margin: 4px 0 10px;
        }
        .prob-fill {
            background: #6c5ce7;
            height: 100%;
        }
        .row { display: flex; justify-content: space-between; font-size: .9rem; }
        .crying { color: #d63031; font-weight: bold; }
        .ok { color: #00b894; font-weight: bold; }
        .error { color: #d63031; }
    </style>
</head>
<body>
    <h1>🍼 Bebek Ağlama Sebebi Analizi</h1>
    <div class="card">
        <p>Analiz etmek istediğiniz <code>.wav</code> ses dosyasını seçin ve yükleyin.</p>
        <form id="form">
            <input type="file" id="fileInput" accept=".wav,audio/*" required>
            <br>
            <button type="submit" id="submitBtn">Analiz Et</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        const form = document.getElementById('form');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Analiz ediliyor...';
            resultDiv.innerHTML = '';

            try {
                const res = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await res.json();

                if (!res.ok) {
                    resultDiv.innerHTML = `<p class="error">Hata: ${data.error}</p>`;
                    return;
                }

                let html = '';
                if (data.is_crying) {
                    html += `<p class="crying">🚨 Bebek Ağlıyor! (Eminlik: %${(data.crying_probability*100).toFixed(2)})</p>`;
                } else {
                    html += `<p class="ok">✅ Ağlama algılanmadı. (Ağlama olasılığı: %${(data.crying_probability*100).toFixed(2)})</p>`;
                }
                html += `<p>En olası neden: <b>${data.top_reason}</b></p>`;
                html += '<div>';
                for (const p of data.probabilities) {
                    const pct = (p.probability * 100).toFixed(2);
                    html += `<div class="row"><span>${p.label}</span><span>%${pct}</span></div>`;
                    html += `<div class="prob-bar"><div class="prob-fill" style="width:${pct}%"></div></div>`;
                }
                html += '</div>';
                resultDiv.innerHTML = html;
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">İstek başarısız oldu: ${err}</p>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Analiz Et';
            }
        });
    </script>
</body>
</html>
